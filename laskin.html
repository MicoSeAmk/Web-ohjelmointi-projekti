    <p>Laskin tukee + ja - laskuja, sekä * ja / laskuja.</p>

    <input id="num1" type="number" placeholder="Luku 1">
    <select id="merkki">
    <option value="+">+</option>
    <option value="-">-</option>
    <option value="*">*</option>
    <option value="/">/</option>
    </select>
